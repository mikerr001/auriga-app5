name: Platform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck libs
        run: pnpm run typecheck:libs

      - name: Typecheck all packages
        run: pnpm run typecheck

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build
        env:
          PORT: 8080
          BASE_PATH: /api

      - name: Build landing page
        run: pnpm --filter @workspace/auriga-landing run build
        env:
          PORT: 3000
          BASE_PATH: /

      - name: Build ops dashboard
        run: pnpm --filter @workspace/auriga-dashboard run build
        env:
          PORT: 21961
          BASE_PATH: /dashboard/

      - name: Upload API server artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-server-${{ github.sha }}
          path: artifacts/api-server/dist/
          retention-days: 14

      - name: Upload landing page artifact
        uses: actions/upload-artifact@v4
        with:
          name: auriga-landing-${{ github.sha }}
          path: artifacts/auriga-landing/dist/
          retention-days: 14

      - name: Upload ops dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: auriga-dashboard-${{ github.sha }}
          path: artifacts/auriga-dashboard/dist/
          retention-days: 14
