name: Build Auriga APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache on-device LLM model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: android/app/src/main/assets/models/Qwen2.5-0.5B-Instruct_multi-prefill-seq_q8_ekv4096.litertlm
          key: qwen-0.5b-instruct-q8-v1

      - name: Download LLM model from HuggingFace
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p android/app/src/main/assets/models
          curl -L --retry 3 --retry-delay 10 \
            "https://huggingface.co/litert-community/Qwen2.5-0.5B-Instruct/resolve/main/Qwen2.5-0.5B-Instruct_multi-prefill-seq_q8_ekv4096.litertlm" \
            -o "android/app/src/main/assets/models/Qwen2.5-0.5B-Instruct_multi-prefill-seq_q8_ekv4096.litertlm"
          ls -lh android/app/src/main/assets/models/

      - name: Fix ellipsis in locale strings
        run: python3 android/fix_strings.py

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        working-directory: android
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: auriga-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            android/app/build/reports/
            android/build/reports/
          retention-days: 7
